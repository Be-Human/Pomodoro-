<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease;
        }

        body.work {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.short-break {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body.long-break {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-width: 400px;
        }

        .stage-info {
            margin-bottom: 32px;
        }

        .stage-name {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .pomodoro-count {
            font-size: 16px;
            color: #888;
        }

        .pomodoro-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s ease;
        }

        .dot.completed {
            background: #667eea;
        }

        .timer-display {
            font-size: 96px;
            font-weight: 300;
            color: #333;
            margin: 40px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-start:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-pause {
            background: #ff6b6b;
            color: white;
        }

        .btn-pause:hover {
            background: #e55a5a;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #666;
        }

        .btn-reset:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body class="work">
    <div class="container">
        <div class="stage-info">
            <div class="stage-name" id="stageName">工作时间</div>
            <div class="pomodoro-count">已完成 <span id="completedCount">0</span> 个番茄</div>
            <div class="pomodoro-dots" id="pomodoroDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        
        <div class="timer-display" id="timerDisplay">25:00</div>
        
        <div class="controls">
            <button class="btn-start" id="startBtn">开始</button>
            <button class="btn-reset" id="resetBtn">重置</button>
        </div>
    </div>

    <script>
        const WORK_MINUTES = 25;
        const SHORT_BREAK_MINUTES = 5;
        const LONG_BREAK_MINUTES = 15;
        const POMODOROS_UNTIL_LONG_BREAK = 4;

        const Stage = {
            WORK: 'work',
            SHORT_BREAK: 'short-break',
            LONG_BREAK: 'long-break'
        };

        const StageNames = {
            [Stage.WORK]: '工作时间',
            [Stage.SHORT_BREAK]: '短休息',
            [Stage.LONG_BREAK]: '长休息'
        };

        const StageDurations = {
            [Stage.WORK]: WORK_MINUTES * 60,
            [Stage.SHORT_BREAK]: SHORT_BREAK_MINUTES * 60,
            [Stage.LONG_BREAK]: LONG_BREAK_MINUTES * 60
        };

        let currentStage = Stage.WORK;
        let completedPomodoros = 0;
        let timeRemaining = StageDurations[currentStage];
        let startTime = null;
        let endTime = null;
        let animationFrameId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const stageName = document.getElementById('stageName');
        const completedCount = document.getElementById('completedCount');
        const pomodoroDots = document.getElementById('pomodoroDots');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            stageName.textContent = StageNames[currentStage];
            completedCount.textContent = completedPomodoros;
            
            document.body.className = currentStage;
            
            const dots = pomodoroDots.querySelectorAll('.dot');
            const currentCycle = completedPomodoros % POMODOROS_UNTIL_LONG_BREAK;
            dots.forEach((dot, index) => {
                dot.classList.toggle('completed', index < currentCycle);
            });
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.8);
            
            setTimeout(() => {
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);
                oscillator2.frequency.setValueAtTime(1000, audioContext.currentTime);
                oscillator2.type = 'sine';
                gainNode2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
                oscillator2.start(audioContext.currentTime);
                oscillator2.stop(audioContext.currentTime + 0.8);
            }, 400);
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.textContent = '暂停';
            startBtn.className = 'btn-pause';
            
            startTime = Date.now();
            endTime = startTime + (timeRemaining * 1000);
            
            function tick() {
                if (!isRunning) return;
                
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                
                if (remaining <= 0) {
                    timeRemaining = 0;
                    updateDisplay();
                    stageComplete();
                    return;
                }
                
                if (remaining !== timeRemaining) {
                    timeRemaining = remaining;
                    updateDisplay();
                }
                
                animationFrameId = requestAnimationFrame(tick);
            }
            
            tick();
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.className = 'btn-start';
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            if (endTime) {
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                timeRemaining = Math.max(0, remaining);
                updateDisplay();
            }
        }

        function stageComplete() {
            pauseTimer();
            playNotificationSound();
            
            if (currentStage === Stage.WORK) {
                completedPomodoros++;
                
                if (completedPomodoros % POMODOROS_UNTIL_LONG_BREAK === 0) {
                    currentStage = Stage.LONG_BREAK;
                } else {
                    currentStage = Stage.SHORT_BREAK;
                }
            } else {
                currentStage = Stage.WORK;
            }
            
            timeRemaining = StageDurations[currentStage];
            updateDisplay();
        }

        function resetTimer() {
            pauseTimer();
            currentStage = Stage.WORK;
            timeRemaining = StageDurations[currentStage];
            updateDisplay();
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
