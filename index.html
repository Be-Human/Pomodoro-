<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease;
            padding: 20px;
        }

        body.work {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.short-break {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body.long-break {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .main-wrapper {
            display: flex;
            gap: 24px;
            max-width: 1000px;
            width: 100%;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 400px;
        }

        .task-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 320px;
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .panel-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .history-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            font-size: 13px;
            border-radius: 20px;
            min-width: auto;
        }

        .history-btn:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
        }

        .filter-btn {
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            font-size: 12px;
            border-radius: 16px;
            min-width: auto;
            border: 1px solid #667eea;
        }

        .filter-btn:hover {
            background: rgba(102, 126, 234, 0.2);
        }

        .add-task-form {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .task-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .task-input:focus {
            border-color: #667eea;
        }

        .btn-add-task {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            font-size: 14px;
            border-radius: 12px;
            min-width: auto;
        }

        .btn-add-task:hover {
            background: #5a6fd6;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .task-item:hover {
            background: #f0f0f0;
            transform: translateY(-1px);
        }

        .task-item.active {
            background: rgba(102, 126, 234, 0.1);
            border-color: #667eea;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-name {
            text-decoration: line-through;
            color: #999;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s ease;
            font-size: 12px;
            color: #667eea;
        }

        .task-checkbox:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .task-item.completed .task-checkbox {
            background: #667eea;
            color: white;
        }

        .btn-delete-task:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-name {
            font-size: 14px;
            font-weight: 500;
            color: #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-pomodoros {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 4px;
        }

        .task-pomodoro-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
        }

        .task-pomodoro-count {
            font-size: 12px;
            color: #888;
        }

        .btn-delete-task {
            padding: 6px 10px;
            background: transparent;
            color: #999;
            font-size: 12px;
            min-width: auto;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .task-item:hover .btn-delete-task {
            opacity: 1;
        }

        .btn-delete-task:hover {
            background: rgba(255, 0, 0, 0.1);
            color: #ff4444;
        }

        .empty-task-hint {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 40px 20px;
        }

        .stage-info {
            margin-bottom: 32px;
        }

        .stage-name {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .pomodoro-count {
            font-size: 16px;
            color: #888;
        }

        .pomodoro-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .current-task {
            margin-top: 16px;
            padding: 12px 20px;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .current-task-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .current-task-name {
            font-size: 16px;
            font-weight: 500;
            color: #667eea;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s ease;
        }

        .dot.completed {
            background: #667eea;
        }

        .timer-display {
            font-size: 96px;
            font-weight: 300;
            color: #333;
            margin: 40px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-start:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-pause {
            background: #ff6b6b;
            color: white;
        }

        .btn-pause:hover {
            background: #e55a5a;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #666;
        }

        .btn-reset:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .top-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .settings-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            min-width: auto;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 500px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .settings-panel {
            width: 450px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .close-btn {
            background: none;
            color: #999;
            font-size: 24px;
            padding: 0;
            min-width: auto;
            line-height: 1;
        }

        .close-btn:hover {
            color: #666;
            background: none;
            transform: none;
        }

        .settings-group {
            margin-bottom: 24px;
        }

        .settings-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }

        .settings-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .settings-input:focus {
            border-color: #667eea;
        }

        .settings-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-input-wrapper input {
            flex: 1;
        }

        .settings-unit {
            color: #888;
            font-size: 14px;
        }

        .settings-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-save {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-save:hover {
            background: #5a6fd6;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
            flex: 1;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .history-content {
            flex: 1;
            overflow-y: auto;
        }

        .history-date-group {
            margin-bottom: 24px;
        }

        .history-date {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .history-date-total {
            font-size: 14px;
            color: #888;
            font-weight: normal;
            margin-left: 8px;
        }

        .history-task-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .history-task-name {
            font-size: 14px;
            color: #333;
        }

        .history-task-pomodoros {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-task-dots {
            display: flex;
            gap: 3px;
        }

        .history-task-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
        }

        .history-task-count {
            font-size: 13px;
            color: #888;
            min-width: 40px;
            text-align: right;
        }

        .empty-history {
            text-align: center;
            color: #999;
            font-size: 14px;
            padding: 40px 20px;
        }

        @media (max-width: 900px) {
            body {
                flex-direction: column;
                padding: 16px;
            }

            .top-buttons {
                position: static;
                width: 100%;
                justify-content: flex-end;
                margin-bottom: 12px;
                z-index: 10;
            }

            .settings-btn {
                background: rgba(255, 255, 255, 0.4);
                padding: 8px 16px;
                font-size: 13px;
                border: 1px solid rgba(255, 255, 255, 0.3);
            }

            .main-wrapper {
                flex-direction: column;
                width: 100%;
            }

            .task-panel {
                width: 100%;
                max-height: 400px;
                padding: 24px 20px;
            }

            .container {
                min-width: auto;
                padding: 32px 24px;
            }

            .timer-display {
                font-size: 64px;
            }

            .panel-header {
                flex-wrap: wrap;
                gap: 12px;
            }

            .panel-header > div {
                gap: 6px;
            }

            .history-btn, .filter-btn {
                padding: 6px 10px;
                font-size: 12px;
            }

            .add-task-form {
                flex-wrap: nowrap;
                gap: 8px;
            }

            .task-input {
                min-width: 0;
                flex: 1;
            }

            .btn-add-task {
                padding: 12px 16px;
                font-size: 14px;
                white-space: nowrap;
                flex-shrink: 0;
            }
        }
    </style>
</head>
<body class="work">
    <div class="top-buttons">
        <button class="settings-btn" id="settingsBtn">设置</button>
    </div>
    
    <div class="modal" id="settingsModal">
        <div class="modal-panel settings-panel">
            <div class="modal-header">
                <h2 class="modal-title">设置</h2>
                <button class="close-btn" id="closeSettingsBtn">&times;</button>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">工作时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="workMinutes" min="1" max="120" value="25">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">短休息时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="shortBreakMinutes" min="1" max="60" value="5">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">长休息时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="longBreakMinutes" min="1" max="120" value="15">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">多少个番茄后进长休息</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="pomodorosUntilLongBreak" min="1" max="10" value="4">
                    <span class="settings-unit">个</span>
                </div>
            </div>
            
            <div class="settings-actions">
                <button class="btn-cancel" id="cancelSettingsBtn">取消</button>
                <button class="btn-save" id="saveSettingsBtn">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="historyModal">
        <div class="modal-panel">
            <div class="modal-header">
                <h2 class="modal-title">历史记录</h2>
                <button class="close-btn" id="closeHistoryBtn">&times;</button>
            </div>
            
            <div class="history-content" id="historyContent">
                <div class="empty-history">暂无历史记录</div>
            </div>
        </div>
    </div>
    
    <div class="main-wrapper">
        <div class="container">
            <div class="stage-info">
                <div class="stage-name" id="stageName">工作时间</div>
                <div class="pomodoro-count">已完成 <span id="completedCount">0</span> 个番茄</div>
                <div class="pomodoro-dots" id="pomodoroDots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="current-task" id="currentTask" style="display: none;">
                    <div class="current-task-label">当前任务</div>
                    <div class="current-task-name" id="currentTaskName"></div>
                </div>
            </div>
            
            <div class="timer-display" id="timerDisplay">25:00</div>
            
            <div class="controls">
                <button class="btn-start" id="startBtn">开始</button>
                <button class="btn-reset" id="resetBtn">重置</button>
            </div>
        </div>

        <div class="task-panel">
            <div class="panel-header">
                <h3 class="panel-title">任务列表</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="filter-btn" id="showCompletedBtn">显示完成</button>
                    <button class="history-btn" id="historyBtn">历史记录</button>
                </div>
            </div>

            <div class="add-task-form">
                <input type="text" class="task-input" id="taskInput" placeholder="输入任务名称..." maxlength="50">
                <button class="btn-add-task" id="addTaskBtn">添加</button>
            </div>

            <div class="task-list" id="taskList">
                <div class="empty-task-hint">点击上方添加任务<br>选择任务后开始计时</div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_SETTINGS = {
            workMinutes: 25,
            shortBreakMinutes: 5,
            longBreakMinutes: 15,
            pomodorosUntilLongBreak: 4
        };

        let settings = { ...DEFAULT_SETTINGS };
        let tasks = [];
        let activeTaskId = null;
        let history = {};

        const Stage = {
            WORK: 'work',
            SHORT_BREAK: 'short-break',
            LONG_BREAK: 'long-break'
        };

        const StageNames = {
            [Stage.WORK]: '工作时间',
            [Stage.SHORT_BREAK]: '短休息',
            [Stage.LONG_BREAK]: '长休息'
        };

        function getStageDuration(stage) {
            switch (stage) {
                case Stage.WORK:
                    return settings.workMinutes * 60;
                case Stage.SHORT_BREAK:
                    return settings.shortBreakMinutes * 60;
                case Stage.LONG_BREAK:
                    return settings.longBreakMinutes * 60;
                default:
                    return settings.workMinutes * 60;
            }
        }

        let currentStage = Stage.WORK;
        let completedPomodoros = 0;
        let timeRemaining = getStageDuration(currentStage);
        let startTime = null;
        let endTime = null;
        let animationFrameId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const stageName = document.getElementById('stageName');
        const completedCount = document.getElementById('completedCount');
        const pomodoroDots = document.getElementById('pomodoroDots');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const cancelSettingsBtn = document.getElementById('cancelSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');

        const workMinutesInput = document.getElementById('workMinutes');
        const shortBreakMinutesInput = document.getElementById('shortBreakMinutes');
        const longBreakMinutesInput = document.getElementById('longBreakMinutes');
        const pomodorosUntilLongBreakInput = document.getElementById('pomodorosUntilLongBreak');

        const taskInput = document.getElementById('taskInput');
        const addTaskBtn = document.getElementById('addTaskBtn');
        const taskList = document.getElementById('taskList');

        const historyBtn = document.getElementById('historyBtn');
        const historyModal = document.getElementById('historyModal');
        const closeHistoryBtn = document.getElementById('closeHistoryBtn');
        const historyContent = document.getElementById('historyContent');

        const currentTaskDiv = document.getElementById('currentTask');
        const currentTaskName = document.getElementById('currentTaskName');
        const showCompletedBtn = document.getElementById('showCompletedBtn');

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function getTodayDateString() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        }

        function loadTasks() {
            const saved = localStorage.getItem('pomodoroTasks');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    tasks = Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    tasks = [];
                }
            }
        }

        function saveTasksToStorage() {
            localStorage.setItem('pomodoroTasks', JSON.stringify(tasks));
        }

        function loadActiveTask() {
            const saved = localStorage.getItem('pomodoroActiveTask');
            if (saved) {
                try {
                    activeTaskId = JSON.parse(saved);
                } catch (e) {
                    activeTaskId = null;
                }
            }
        }

        function saveActiveTaskToStorage() {
            localStorage.setItem('pomodoroActiveTask', JSON.stringify(activeTaskId));
        }

        function loadHistory() {
            const saved = localStorage.getItem('pomodoroHistory');
            if (saved) {
                try {
                    history = JSON.parse(saved) || {};
                } catch (e) {
                    history = {};
                }
            }
        }

        function saveHistoryToStorage() {
            localStorage.setItem('pomodoroHistory', JSON.stringify(history));
        }

        function addTask(name) {
            const task = {
                id: generateId(),
                name: name.trim(),
                completedPomodoros: 0,
                isCompleted: false,
                createdAt: getTodayDateString()
            };
            tasks.push(task);
            saveTasksToStorage();
            renderTasks();
            return task;
        }

        function deleteTask(id) {
            const index = tasks.findIndex(t => t.id === id);
            if (index !== -1) {
                tasks.splice(index, 1);
                if (activeTaskId === id) {
                    activeTaskId = null;
                    saveActiveTaskToStorage();
                }
                saveTasksToStorage();
                renderTasks();
            }
        }

        function setActiveTask(id) {
            if (isRunning && currentStage === Stage.WORK) {
                return;
            }
            if (activeTaskId === id) {
                activeTaskId = null;
            } else {
                activeTaskId = id;
            }
            saveActiveTaskToStorage();
            renderTasks();
            updateCurrentTaskDisplay();
        }

        function addPomodoroToTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.completedPomodoros++;
                saveTasksToStorage();
                renderTasks();

                const today = getTodayDateString();
                if (!history[today]) {
                    history[today] = [];
                }
                history[today].push({
                    taskId: task.id,
                    taskName: task.name,
                    completedAt: new Date().toISOString()
                });
                saveHistoryToStorage();
            }
        }

        function toggleTaskCompleted(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.isCompleted = !task.isCompleted;
                if (task.isCompleted && activeTaskId === id) {
                    activeTaskId = null;
                    saveActiveTaskToStorage();
                }
                saveTasksToStorage();
                renderTasks();
            }
        }

        let showCompletedTasks = false;
        function toggleShowCompleted() {
            showCompletedTasks = !showCompletedTasks;
            renderTasks();
            updateShowCompletedButton();
        }

        function updateShowCompletedButton() {
            const btn = document.getElementById('showCompletedBtn');
            if (btn) {
                btn.textContent = showCompletedTasks ? '显示未完成' : '显示完成';
            }
        }

        function updateCurrentTaskDisplay() {
            if (activeTaskId) {
                const task = tasks.find(t => t.id === activeTaskId);
                if (task && !task.isCompleted) {
                    currentTaskDiv.style.display = 'block';
                    currentTaskName.textContent = task.name;
                    return;
                }
            }
            currentTaskDiv.style.display = 'none';
        }

        function renderTasks() {
            const filteredTasks = tasks.filter(task => 
                showCompletedTasks ? task.isCompleted : !task.isCompleted
            );

            if (filteredTasks.length === 0) {
                const message = showCompletedTasks 
                    ? '暂无已完成的任务' 
                    : '点击上方添加任务<br>选择任务后开始计时';
                taskList.innerHTML = `<div class="empty-task-hint">${message}</div>`;
                return;
            }

            let html = '';
            filteredTasks.forEach(task => {
                const isActive = task.id === activeTaskId;
                const isCurrentlyRunning = isActive && isRunning && currentStage === Stage.WORK;
                html += `
                    <div class="task-item ${isActive ? 'active' : ''} ${task.isCompleted ? 'completed' : ''}" data-task-id="${task.id}">
                        <div class="task-checkbox" data-task-id="${task.id}">
                            ${task.isCompleted ? '✓' : ''}
                        </div>
                        <div class="task-info">
                            <div class="task-name">${escapeHtml(task.name)}</div>
                            <div class="task-pomodoros">
                                ${task.completedPomodoros > 0 ? renderPomodoroDots(task.completedPomodoros) : ''}
                                <span class="task-pomodoro-count">${task.completedPomodoros} 个番茄</span>
                            </div>
                        </div>
                        <button class="btn-delete-task" data-task-id="${task.id}" ${isCurrentlyRunning ? 'disabled' : ''}>删除</button>
                    </div>
                `;
            });
            taskList.innerHTML = html;

            taskList.querySelectorAll('.task-checkbox').forEach(checkbox => {
                checkbox.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const taskId = checkbox.dataset.taskId;
                    toggleTaskCompleted(taskId);
                });
            });

            taskList.querySelectorAll('.task-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (e.target.classList.contains('btn-delete-task') || 
                        e.target.classList.contains('task-checkbox')) {
                        return;
                    }
                    const taskId = item.dataset.taskId;
                    setActiveTask(taskId);
                });
            });

            taskList.querySelectorAll('.btn-delete-task').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (btn.disabled) {
                        return;
                    }
                    const taskId = btn.dataset.taskId;
                    deleteTask(taskId);
                });
            });
        }

        function renderPomodoroDots(count) {
            let dots = '';
            const maxDots = Math.min(count, 5);
            for (let i = 0; i < maxDots; i++) {
                dots += '<span class="task-pomodoro-dot"></span>';
            }
            return `<div class="task-pomodoro-dots">${dots}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderHistory() {
            const dates = Object.keys(history).sort().reverse();
            
            if (dates.length === 0) {
                historyContent.innerHTML = '<div class="empty-history">暂无历史记录</div>';
                return;
            }

            let html = '';
            dates.forEach(date => {
                const records = history[date];
                const taskStats = {};
                
                records.forEach(record => {
                    if (!taskStats[record.taskName]) {
                        taskStats[record.taskName] = 0;
                    }
                    taskStats[record.taskName]++;
                });

                const totalPomodoros = records.length;
                const taskNames = Object.keys(taskStats);

                html += `
                    <div class="history-date-group">
                        <div class="history-date">
                            ${formatDate(date)}
                            <span class="history-date-total">共 ${totalPomodoros} 个番茄</span>
                        </div>
                        <div class="history-task-list">
                `;

                taskNames.forEach(taskName => {
                    const count = taskStats[taskName];
                    html += `
                        <div class="history-task-item">
                            <span class="history-task-name">${escapeHtml(taskName)}</span>
                            <div class="history-task-pomodoros">
                                <div class="history-task-dots">
                                    ${renderHistoryPomodoroDots(count)}
                                </div>
                                <span class="history-task-count">${count} 个</span>
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            historyContent.innerHTML = html;
        }

        function renderHistoryPomodoroDots(count) {
            let dots = '';
            const maxDots = Math.min(count, 10);
            for (let i = 0; i < maxDots; i++) {
                dots += '<span class="history-task-dot"></span>';
            }
            return dots;
        }

        function formatDate(dateStr) {
            const parts = dateStr.split('-');
            const year = parseInt(parts[0]);
            const month = parseInt(parts[1]);
            const day = parseInt(parts[2]);
            
            const today = new Date();
            const date = new Date(year, month - 1, day);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) {
                return '今天';
            } else if (date.toDateString() === yesterday.toDateString()) {
                return '昨天';
            } else {
                return `${year}年${month}月${day}日`;
            }
        }

        function openHistoryModal() {
            renderHistory();
            historyModal.classList.add('show');
        }

        function closeHistoryModal() {
            historyModal.classList.remove('show');
        }

        function loadSettings() {
            const saved = localStorage.getItem('pomodoroSettings');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    settings = { ...DEFAULT_SETTINGS, ...parsed };
                } catch (e) {
                    settings = { ...DEFAULT_SETTINGS };
                }
            }
        }

        function saveSettingsToStorage() {
            localStorage.setItem('pomodoroSettings', JSON.stringify(settings));
        }

        function populateSettingsForm() {
            workMinutesInput.value = settings.workMinutes;
            shortBreakMinutesInput.value = settings.shortBreakMinutes;
            longBreakMinutesInput.value = settings.longBreakMinutes;
            pomodorosUntilLongBreakInput.value = settings.pomodorosUntilLongBreak;
        }

        function updatePomodoroDots() {
            const dotsContainer = pomodoroDots;
            const currentDotCount = dotsContainer.children.length;
            const targetCount = settings.pomodorosUntilLongBreak;

            if (currentDotCount > targetCount) {
                while (dotsContainer.children.length > targetCount) {
                    dotsContainer.removeChild(dotsContainer.lastChild);
                }
            } else if (currentDotCount < targetCount) {
                while (dotsContainer.children.length < targetCount) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dotsContainer.appendChild(dot);
                }
            }
        }

        function openSettingsModal() {
            populateSettingsForm();
            settingsModal.classList.add('show');
        }

        function closeSettingsModal() {
            settingsModal.classList.remove('show');
        }

        function handleSaveSettings() {
            const workMinutes = parseInt(workMinutesInput.value) || DEFAULT_SETTINGS.workMinutes;
            const shortBreakMinutes = parseInt(shortBreakMinutesInput.value) || DEFAULT_SETTINGS.shortBreakMinutes;
            const longBreakMinutes = parseInt(longBreakMinutesInput.value) || DEFAULT_SETTINGS.longBreakMinutes;
            const pomodorosUntilLongBreak = parseInt(pomodorosUntilLongBreakInput.value) || DEFAULT_SETTINGS.pomodorosUntilLongBreak;

            settings.workMinutes = Math.max(1, Math.min(120, workMinutes));
            settings.shortBreakMinutes = Math.max(1, Math.min(60, shortBreakMinutes));
            settings.longBreakMinutes = Math.max(1, Math.min(120, longBreakMinutes));
            settings.pomodorosUntilLongBreak = Math.max(1, Math.min(10, pomodorosUntilLongBreak));

            saveSettingsToStorage();
            updatePomodoroDots();

            if (!isRunning) {
                timeRemaining = getStageDuration(currentStage);
                updateDisplay();
            }

            closeSettingsModal();
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            stageName.textContent = StageNames[currentStage];
            completedCount.textContent = completedPomodoros;
            
            document.body.className = currentStage;
            
            document.title = `[${formatTime(timeRemaining)}] ${StageNames[currentStage]} - 番茄钟`;
            
            const dots = pomodoroDots.querySelectorAll('.dot');
            const currentCycle = completedPomodoros % settings.pomodorosUntilLongBreak;
            dots.forEach((dot, index) => {
                dot.classList.toggle('completed', index < currentCycle);
            });
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.8);
            
            setTimeout(() => {
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);
                oscillator2.frequency.setValueAtTime(1000, audioContext.currentTime);
                oscillator2.type = 'sine';
                gainNode2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
                oscillator2.start(audioContext.currentTime);
                oscillator2.stop(audioContext.currentTime + 0.8);
            }, 400);
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.textContent = '暂停';
            startBtn.className = 'btn-pause';
            
            startTime = Date.now();
            endTime = startTime + (timeRemaining * 1000);
            
            function tick() {
                if (!isRunning) return;
                
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                
                if (remaining <= 0) {
                    timeRemaining = 0;
                    updateDisplay();
                    stageComplete();
                    return;
                }
                
                if (remaining !== timeRemaining) {
                    timeRemaining = remaining;
                    updateDisplay();
                }
                
                animationFrameId = requestAnimationFrame(tick);
            }
            
            tick();
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.className = 'btn-start';
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            if (endTime) {
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                timeRemaining = Math.max(0, remaining);
                updateDisplay();
            }
        }

        function stageComplete() {
            pauseTimer();
            playNotificationSound();
            
            if (currentStage === Stage.WORK) {
                completedPomodoros++;
                
                if (activeTaskId) {
                    addPomodoroToTask(activeTaskId);
                }
                
                if (completedPomodoros % settings.pomodorosUntilLongBreak === 0) {
                    currentStage = Stage.LONG_BREAK;
                } else {
                    currentStage = Stage.SHORT_BREAK;
                }
            } else {
                currentStage = Stage.WORK;
            }
            
            timeRemaining = getStageDuration(currentStage);
            updateDisplay();
        }

        function resetTimer() {
            pauseTimer();
            currentStage = Stage.WORK;
            timeRemaining = getStageDuration(currentStage);
            updateDisplay();
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);

        function isModalOpen() {
            return settingsModal.classList.contains('show') || historyModal.classList.contains('show');
        }

        document.addEventListener('keydown', (e) => {
            const isInputFocused = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable;
            if (isInputFocused || isModalOpen()) {
                return;
            }
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            }
        });

        settingsBtn.addEventListener('click', openSettingsModal);
        closeSettingsBtn.addEventListener('click', closeSettingsModal);
        cancelSettingsBtn.addEventListener('click', closeSettingsModal);
        saveSettingsBtn.addEventListener('click', handleSaveSettings);

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettingsModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && settingsModal.classList.contains('show')) {
                closeSettingsModal();
            }
            if (e.code === 'Escape' && historyModal.classList.contains('show')) {
                closeHistoryModal();
            }
        });

        addTaskBtn.addEventListener('click', () => {
            const name = taskInput.value.trim();
            if (name) {
                addTask(name);
                taskInput.value = '';
                taskInput.focus();
            }
        });

        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const name = taskInput.value.trim();
                if (name) {
                    addTask(name);
                    taskInput.value = '';
                }
            }
        });

        historyBtn.addEventListener('click', openHistoryModal);
        closeHistoryBtn.addEventListener('click', closeHistoryModal);

        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) {
                closeHistoryModal();
            }
        });

        showCompletedBtn.addEventListener('click', toggleShowCompleted);

        loadSettings();
        loadTasks();
        loadActiveTask();
        loadHistory();
        updatePomodoroDots();
        timeRemaining = getStageDuration(currentStage);
        updateDisplay();
        renderTasks();
        updateCurrentTaskDisplay();
    </script>
</body>
</html>
