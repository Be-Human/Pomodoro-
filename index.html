<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: background 0.5s ease;
        }

        body.work {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.short-break {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        body.long-break {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 48px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-width: 400px;
        }

        .stage-info {
            margin-bottom: 32px;
        }

        .stage-name {
            font-size: 28px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .pomodoro-count {
            font-size: 16px;
            color: #888;
        }

        .pomodoro-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #e0e0e0;
            transition: all 0.3s ease;
        }

        .dot.completed {
            background: #667eea;
        }

        .timer-display {
            font-size: 96px;
            font-weight: 300;
            color: #333;
            margin: 40px 0;
            font-variant-numeric: tabular-nums;
            letter-spacing: -2px;
        }

        .controls {
            display: flex;
            gap: 16px;
            justify-content: center;
        }

        button {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
        }

        .btn-start {
            background: #667eea;
            color: white;
        }

        .btn-start:hover {
            background: #5a6fd6;
            transform: translateY(-2px);
        }

        .btn-pause {
            background: #ff6b6b;
            color: white;
        }

        .btn-pause:hover {
            background: #e55a5a;
            transform: translateY(-2px);
        }

        .btn-reset {
            background: #e0e0e0;
            color: #666;
        }

        .btn-reset:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 14px;
            min-width: auto;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .settings-modal.show {
            display: flex;
        }

        .settings-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .settings-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
        }

        .close-btn {
            background: none;
            color: #999;
            font-size: 24px;
            padding: 0;
            min-width: auto;
            line-height: 1;
        }

        .close-btn:hover {
            color: #666;
            background: none;
            transform: none;
        }

        .settings-group {
            margin-bottom: 24px;
        }

        .settings-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 8px;
        }

        .settings-input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .settings-input:focus {
            border-color: #667eea;
        }

        .settings-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-input-wrapper input {
            flex: 1;
        }

        .settings-unit {
            color: #888;
            font-size: 14px;
        }

        .settings-actions {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .btn-save {
            background: #667eea;
            color: white;
            flex: 1;
        }

        .btn-save:hover {
            background: #5a6fd6;
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
            flex: 1;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body class="work">
    <button class="settings-btn" id="settingsBtn">设置</button>
    
    <div class="settings-modal" id="settingsModal">
        <div class="settings-panel">
            <div class="settings-header">
                <h2 class="settings-title">设置</h2>
                <button class="close-btn" id="closeSettingsBtn">&times;</button>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">工作时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="workMinutes" min="1" max="120" value="25">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">短休息时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="shortBreakMinutes" min="1" max="60" value="5">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">长休息时长</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="longBreakMinutes" min="1" max="120" value="15">
                    <span class="settings-unit">分钟</span>
                </div>
            </div>
            
            <div class="settings-group">
                <label class="settings-label">多少个番茄后进长休息</label>
                <div class="settings-input-wrapper">
                    <input type="number" class="settings-input" id="pomodorosUntilLongBreak" min="1" max="10" value="4">
                    <span class="settings-unit">个</span>
                </div>
            </div>
            
            <div class="settings-actions">
                <button class="btn-cancel" id="cancelSettingsBtn">取消</button>
                <button class="btn-save" id="saveSettingsBtn">保存</button>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="stage-info">
            <div class="stage-name" id="stageName">工作时间</div>
            <div class="pomodoro-count">已完成 <span id="completedCount">0</span> 个番茄</div>
            <div class="pomodoro-dots" id="pomodoroDots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>
        
        <div class="timer-display" id="timerDisplay">25:00</div>
        
        <div class="controls">
            <button class="btn-start" id="startBtn">开始</button>
            <button class="btn-reset" id="resetBtn">重置</button>
        </div>
    </div>

    <script>
        const DEFAULT_SETTINGS = {
            workMinutes: 25,
            shortBreakMinutes: 5,
            longBreakMinutes: 15,
            pomodorosUntilLongBreak: 4
        };

        let settings = { ...DEFAULT_SETTINGS };

        const Stage = {
            WORK: 'work',
            SHORT_BREAK: 'short-break',
            LONG_BREAK: 'long-break'
        };

        const StageNames = {
            [Stage.WORK]: '工作时间',
            [Stage.SHORT_BREAK]: '短休息',
            [Stage.LONG_BREAK]: '长休息'
        };

        function getStageDuration(stage) {
            switch (stage) {
                case Stage.WORK:
                    return settings.workMinutes * 60;
                case Stage.SHORT_BREAK:
                    return settings.shortBreakMinutes * 60;
                case Stage.LONG_BREAK:
                    return settings.longBreakMinutes * 60;
                default:
                    return settings.workMinutes * 60;
            }
        }

        let currentStage = Stage.WORK;
        let completedPomodoros = 0;
        let timeRemaining = getStageDuration(currentStage);
        let startTime = null;
        let endTime = null;
        let animationFrameId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timerDisplay');
        const stageName = document.getElementById('stageName');
        const completedCount = document.getElementById('completedCount');
        const pomodoroDots = document.getElementById('pomodoroDots');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        const settingsBtn = document.getElementById('settingsBtn');
        const settingsModal = document.getElementById('settingsModal');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');
        const cancelSettingsBtn = document.getElementById('cancelSettingsBtn');
        const saveSettingsBtn = document.getElementById('saveSettingsBtn');

        const workMinutesInput = document.getElementById('workMinutes');
        const shortBreakMinutesInput = document.getElementById('shortBreakMinutes');
        const longBreakMinutesInput = document.getElementById('longBreakMinutes');
        const pomodorosUntilLongBreakInput = document.getElementById('pomodorosUntilLongBreak');

        function loadSettings() {
            const saved = localStorage.getItem('pomodoroSettings');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    settings = { ...DEFAULT_SETTINGS, ...parsed };
                } catch (e) {
                    settings = { ...DEFAULT_SETTINGS };
                }
            }
        }

        function saveSettingsToStorage() {
            localStorage.setItem('pomodoroSettings', JSON.stringify(settings));
        }

        function populateSettingsForm() {
            workMinutesInput.value = settings.workMinutes;
            shortBreakMinutesInput.value = settings.shortBreakMinutes;
            longBreakMinutesInput.value = settings.longBreakMinutes;
            pomodorosUntilLongBreakInput.value = settings.pomodorosUntilLongBreak;
        }

        function updatePomodoroDots() {
            const dotsContainer = pomodoroDots;
            const currentDotCount = dotsContainer.children.length;
            const targetCount = settings.pomodorosUntilLongBreak;

            if (currentDotCount > targetCount) {
                while (dotsContainer.children.length > targetCount) {
                    dotsContainer.removeChild(dotsContainer.lastChild);
                }
            } else if (currentDotCount < targetCount) {
                while (dotsContainer.children.length < targetCount) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dotsContainer.appendChild(dot);
                }
            }
        }

        function openSettingsModal() {
            populateSettingsForm();
            settingsModal.classList.add('show');
        }

        function closeSettingsModal() {
            settingsModal.classList.remove('show');
        }

        function handleSaveSettings() {
            const workMinutes = parseInt(workMinutesInput.value) || DEFAULT_SETTINGS.workMinutes;
            const shortBreakMinutes = parseInt(shortBreakMinutesInput.value) || DEFAULT_SETTINGS.shortBreakMinutes;
            const longBreakMinutes = parseInt(longBreakMinutesInput.value) || DEFAULT_SETTINGS.longBreakMinutes;
            const pomodorosUntilLongBreak = parseInt(pomodorosUntilLongBreakInput.value) || DEFAULT_SETTINGS.pomodorosUntilLongBreak;

            settings.workMinutes = Math.max(1, Math.min(120, workMinutes));
            settings.shortBreakMinutes = Math.max(1, Math.min(60, shortBreakMinutes));
            settings.longBreakMinutes = Math.max(1, Math.min(120, longBreakMinutes));
            settings.pomodorosUntilLongBreak = Math.max(1, Math.min(10, pomodorosUntilLongBreak));

            saveSettingsToStorage();
            updatePomodoroDots();

            if (!isRunning) {
                timeRemaining = getStageDuration(currentStage);
                updateDisplay();
            }

            closeSettingsModal();
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            stageName.textContent = StageNames[currentStage];
            completedCount.textContent = completedPomodoros;
            
            document.body.className = currentStage;
            
            const dots = pomodoroDots.querySelectorAll('.dot');
            const currentCycle = completedPomodoros % settings.pomodorosUntilLongBreak;
            dots.forEach((dot, index) => {
                dot.classList.toggle('completed', index < currentCycle);
            });
        }

        function playNotificationSound() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.setValueAtTime(800, audioContext.currentTime);
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.8);
            
            setTimeout(() => {
                const oscillator2 = audioContext.createOscillator();
                const gainNode2 = audioContext.createGain();
                oscillator2.connect(gainNode2);
                gainNode2.connect(audioContext.destination);
                oscillator2.frequency.setValueAtTime(1000, audioContext.currentTime);
                oscillator2.type = 'sine';
                gainNode2.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.8);
                oscillator2.start(audioContext.currentTime);
                oscillator2.stop(audioContext.currentTime + 0.8);
            }, 400);
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.textContent = '暂停';
            startBtn.className = 'btn-pause';
            
            startTime = Date.now();
            endTime = startTime + (timeRemaining * 1000);
            
            function tick() {
                if (!isRunning) return;
                
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                
                if (remaining <= 0) {
                    timeRemaining = 0;
                    updateDisplay();
                    stageComplete();
                    return;
                }
                
                if (remaining !== timeRemaining) {
                    timeRemaining = remaining;
                    updateDisplay();
                }
                
                animationFrameId = requestAnimationFrame(tick);
            }
            
            tick();
        }

        function pauseTimer() {
            isRunning = false;
            startBtn.textContent = '开始';
            startBtn.className = 'btn-start';
            
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            if (endTime) {
                const now = Date.now();
                const remaining = Math.ceil((endTime - now) / 1000);
                timeRemaining = Math.max(0, remaining);
                updateDisplay();
            }
        }

        function stageComplete() {
            pauseTimer();
            playNotificationSound();
            
            if (currentStage === Stage.WORK) {
                completedPomodoros++;
                
                if (completedPomodoros % settings.pomodorosUntilLongBreak === 0) {
                    currentStage = Stage.LONG_BREAK;
                } else {
                    currentStage = Stage.SHORT_BREAK;
                }
            } else {
                currentStage = Stage.WORK;
            }
            
            timeRemaining = getStageDuration(currentStage);
            updateDisplay();
        }

        function resetTimer() {
            pauseTimer();
            currentStage = Stage.WORK;
            timeRemaining = getStageDuration(currentStage);
            updateDisplay();
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleTimer();
            } else if (e.code === 'KeyR') {
                e.preventDefault();
                resetTimer();
            }
        });

        settingsBtn.addEventListener('click', openSettingsModal);
        closeSettingsBtn.addEventListener('click', closeSettingsModal);
        cancelSettingsBtn.addEventListener('click', closeSettingsModal);
        saveSettingsBtn.addEventListener('click', handleSaveSettings);

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                closeSettingsModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Escape' && settingsModal.classList.contains('show')) {
                closeSettingsModal();
            }
        });

        loadSettings();
        updatePomodoroDots();
        timeRemaining = getStageDuration(currentStage);
        updateDisplay();
    </script>
</body>
</html>
